services:
  rpi-dev:
    container_name: rpi-dev
    build:
      context: .
      dockerfile: docker/rpi-dev.Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        TZ: ${TZ:-Asia/Tokyo}
        DEV_PASSWORD: ${DEV_PASSWORD:-devpassword}
    platform: linux/amd64
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      RPI_HOST: ${RPI_HOST:-raspberrypi.local}
      RPI_USER: ${RPI_USER:-pi}
      RPI_SYSROOT_BASE: /opt/rpi-sysroot
      RPI_TARGET_TRIPLE: aarch64-linux-gnu
      RPI_CPU: ${RPI_CPU:-}
    volumes:
      - rpi-workspace:/workspace
      - rpi-sysroot:/opt/rpi-sysroot
      - ${HOME}/.ssh:/home/dev/.ssh:rw
      - ${HOME}/.gitconfig:/home/dev/.gitconfig:ro
    working_dir: /workspace
    ports:
      - "63206:22"
    tty: true
    stdin_open: true

volumes:
  rpi-workspace:
  rpi-sysroot: